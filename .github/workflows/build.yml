name: Build & Release RepeaterX

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build
        run: gradle shadowJar --no-daemon

      - name: Verify JAR
        run: |
          JAR=$(ls build/libs/RepeaterX-*.jar 2>/dev/null | head -1)
          [ -z "$JAR" ] && echo "ERROR: JAR not found" && exit 1
          echo "Built: $JAR ($(du -sh $JAR | cut -f1))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RepeaterX-${{ github.sha }}
          path: build/libs/RepeaterX-*.jar
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          files: build/libs/RepeaterX-*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
